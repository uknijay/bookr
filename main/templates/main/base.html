<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bookr</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #005493;
      --accent-dark: #004574;
      --bg: #f6f8fb;
      --text: #111;
      --white: #ffffff;
      --shadow: 0 8px 18px rgba(0,0,0,.10);
      --max-width: 1100px;
    }
    html, body {
    margin: 0 !important;
    padding: 0 !important;
  }

  .site-header {
    background: var(--accent) !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  .site-header-inner {
  width: 100%;
  height: 72px;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .site-header {
      background: var(--accent);
      box-shadow: var(--shadow);
      width: 100%;
    }

    .site-header-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      height: 72px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--white);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .site-logo img {
      height: 42px;
      width: auto;
      display: block;
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .site-nav a {
      text-decoration: none;
      color: var(--white);
      font-weight: 600;
      padding: 10px 16px;
      border-radius: 999px;
      transition: background-color 0.2s ease;
    }

    .site-nav a:hover {
      background: rgba(255,255,255,.12);
    }

    @media (max-width: 768px) {
      .site-header-inner {
        height: 64px;
        padding: 0 16px;
      }

      .site-logo {
        font-size: 22px;
      }

      .site-logo img {
        height: 36px;
      }

      .site-nav a {
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="site-header-inner">
      <a href="/" class="site-logo">
        <img src="/media/bookr_logo.png" alt="Bookr logo">

      </a>

      <nav class="site-nav">
        <a href="{% url 'login' %}">Sign in</a>
      </nav>
    </div>
  </header>

  {% block content %}{% endblock %}

</body>
</html>
