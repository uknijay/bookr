<!doctype html>
<html lang="en">
<head>
  <!-- Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 4.0 CSS -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Event Detail - Skeleton</title>

  <style>
    :root{
      --max-width: 1100px;
      --text: #111;
      --muted: #444;
      --light-muted: #666;

      --border: #cfcfcf;
      --radius: 16px;
      --shadow: 0 10px 24px rgba(0,0,0,.08);
    }

    * { box-sizing: border-box; }

    body{
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      color: var(--text);
      background: #fff;
    }


    .topbar{
      height: 56px;
      background: #d6d6d6;
    }


    .page{
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 28px 18px;
    }


    .mainsection{
      display: grid;
      grid-template-columns: 80% 20%;
      gap: 26px;
      align-items: start;
      margin-top: 18px;
    }


    .rightcol{
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      background: #dedede;
      min-height: 420px;
      min-width: 280px;
    }


    .titleblock h1{
      margin: 0;
      font-size: 56px;
      line-height: 1.0;
      letter-spacing: -1px;
    }

    .titleblock .byline{
      margin-top: 8px;
      font-size: 22px;
      color: var(--muted);
    }

    .titleblock .ratingrow{
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
    }

    .titleblock .stars{
      letter-spacing: 2px;
      font-size: 18px;
    }

    .titleblock .ratingnum{
      font-weight: 700;
    }

    .titleblock .ratingcount{
      color: var(--light-muted);
    }


    .carousel-card{
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      background: #e9e9e9;
    }


    .carousel-card .carousel-item img{
      height: 420px;
      object-fit: cover;
    }

    /* Responsive */
    @media (max-width: 980px){
      .mainsection{ grid-template-columns: 1fr; }
      .rightcol{ min-width: 0; }
    }

    @media (max-width: 700px){
      .titleblock h1{ font-size: 40px; }
      .titleblock .byline{ font-size: 18px; }
      .carousel-card .carousel-item img{ height: 260px; }
    }
  </style>
</head>

<body>
  <div class="topbar"></div>

  <main class="page">
    <section class="titleblock">
      <h1>Event Title</h1>
      <div class="byline">By Business Display Name</div>

      <div class="ratingrow" aria-label="rating">
        <span class="stars" aria-hidden="true">★★★★☆</span>
        <span class="ratingnum">3.9</span>
        <span class="ratingcount">(124)</span>
      </div>
    </section>

    <section class="mainsection">
      <!-- LEFT: Carousel -->
      <div class="carousel-card">
        <!-- Bootstrap carousel: indicators + controls + slides -->
        <div id="eventCarousel" class="carousel slide" data-ride="carousel">
          <ol class="carousel-indicators">
            <li data-target="#eventCarousel" data-slide-to="0" class="active"></li>
            <li data-target="#eventCarousel" data-slide-to="1"></li>
            <li data-target="#eventCarousel" data-slide-to="2"></li>
          </ol>

          <!-- Random images as placeholder to see how its laid out-->
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img class="d-block w-100" src="https://picsum.photos/1200/700?random=1" alt="Event image 1">
            </div>

            <div class="carousel-item">
              <img class="d-block w-100" src="https://picsum.photos/1200/700?random=2" alt="Event image 2">
            </div>

            <div class="carousel-item">
              <img class="d-block w-100" src="https://picsum.photos/1200/700?random=3" alt="Event image 3">
            </div>
          </div>

          <a class="carousel-control-prev" href="#eventCarousel" role="button" data-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="sr-only">Previous</span>
          </a>

          <a class="carousel-control-next" href="#eventCarousel" role="button" data-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="sr-only">Next</span>
          </a>
        </div>
      </div>

      <!--  Quick info placeholder -->
      <aside class="rightcol">
        <!-- Quick info card  -->
      </aside>
    </section>
  </main>

  <!-- Bootstrap -->
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
</body>
</html>
