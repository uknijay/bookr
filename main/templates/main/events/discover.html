{% extends "main/base.html" %}

{% block content %}
<style>
  .discover-page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 48px;
  }

  .discover-hero {
    text-align: center;
    padding: 40px 0 30px;
  }

  .discover-title {
    margin: 0 auto;
    max-width: 900px;
    font-size: 48px;
    font-weight: 700;
    line-height: 1.1;
    color: #111;
  }

  .discover-subtitle {
    margin-top: 16px;
    font-size: 22px;
    color: #444;
  }

  .discover-divider {
    border: none;
    border-top: 1px solid rgba(0,0,0,0.1);
    margin: 10px 0 28px;
  }

  .discover-section h2 {
    margin-bottom: 18px;
    font-size: 34px;
    font-weight: 700;
    color: #111;
  }

  .discover-gallery .container {
    max-width: 100%;
    padding-left: 0;
    padding-right: 0;
  }

  @media (max-width: 768px) {
    .discover-title {
      font-size: 36px;
    }

    .discover-subtitle {
      font-size: 18px;
    }
  }
</style>

<div class="discover-page">
  <section class="discover-hero">
    <h1 class="discover-title">Discover the best events near you</h1>
    <p class="discover-subtitle">Explore top events and book with ease</p>
          {% include "main/components/search_bar.html" %}
  </section>

  <hr class="discover-divider">

  <section class="discover-section">
    <div id="discover-results">
      {% include "main/events/discover_results.html" %}
    </div>
  </section>
</div>

<script>
  $(document).ready(function () {
    $("#discover-search-form").on("submit", function (e) {
      e.preventDefault();

      const form = $(this);
      const url = form.attr("action");
      const data = form.serialize();

      $.ajax({
        url: url,
        type: "GET",
        data: data,
        headers: {
          "X-Requested-With": "XMLHttpRequest"
        },
        success: function (response) {
          $("#discover-results").html(response);

        },
        error: function () {
          alert("Search failed | Please try again.");
        }
      });
    });
  });
</script>

{% endblock %}
