<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Card</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --accent: #005493;
      --accent-10: rgba(0, 84, 147, 0.10);
      --accent-20: rgba(0, 84, 147, 0.20);
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #111;
      --muted: #666;
      --shadow: 0 10px 24px rgba(0,0,0,.08);
      --radius: 20px;
    }

    body {
      background: var(--bg);
      font-family: "Inter", sans-serif;
      padding: 40px;
    }

    .event-card {
      width: 28rem;
      border: none;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .event-card img {
      height: 180px;
      object-fit: cover;
    }

    .event-card .card-body {
      background: linear-gradient(to bottom, #ffffff 0%, #f9fbfe 100%);
      padding: 1rem 1.1rem;
    }

    .event-card .card-title {
      color: var(--text);
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .event-card .location-text {
      color: var(--muted);
      margin-bottom: 0.8rem;
    }

    .event-card .card-divider {
      border: 1 solid rgba(0,0,0,.05);
      border-top: 1px solid rgba(0,0,0,.2);
      margin: 0.75rem 0;
    }

    .event-card .date-text {
      color: var(--text);
      font-weight: 500;
      margin: 0;
    }

    .event-card .capacity-badge {
      background: var(--accent-10);
      color: var(--accent);
      border: 1px solid var(--accent-20);
      font-weight: 600;
      padding: 0.45rem 0.8rem;
      border-radius: 999px;
    }

    .event-card .btn-view {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 999px;
      font-weight: 600;
      padding: 0.55rem 1rem;
    }

    .event-card .btn-view:hover {
      background: #004574;
      color: white;
    }
  </style>
</head>
<body>

  <div class="card event-card">
    <img src="https://placehold.co/600x400" class="card-img-top" alt="Event image">

    <div class="card-body">
      <h3 class="card-title">Event Title</h3>
      <p class="location-text">Glasgow City Centre</p>

      <hr class="card-divider">

      <div class="d-flex justify-content-between align-items-center mb-3">
        <p class="date-text">May 22nd</p>
        <span class="capacity-badge">12 / 50</span>
      </div>

      <a href="#" class="btn btn-view w-100">View Event</a>
    </div>
  </div>

</body>
</html>
