
{% load static %}
{% block extra_head %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Card</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'main/css/components.css' %}">

{% endblock %}

<div class="card event-card">
  {% if event.photos.first %}
    <img src="{{ event.photos.first.image.url }}" class="card-img-top" alt="{{ event.title }}">
  {% else %}
    <img src="https://placehold.co/600x400" class="card-img-top" alt="Event image">
  {% endif %}

  <div class="card-body">
    <h3 class="card-title">{{ event.title }}</h3>
    <p class="location-text">{{ event.venue }}</p>

    <hr class="card-divider">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <p class="date-text">{{ event.date|date:"M jS" }}</p>
      <span class="capacity-badge">{{ event.currentCapacity }} / {{ event.maxCapacity }}</span>
    </div>

    <a href="{% url 'event_detail' event.id %}" class="btn btn-view w-100">View Event</a>
  </div>
</div>
