<div class="container py-4">
  <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4">
    {% for event in events %}
      <div class="col d-flex">
        {% include "components/event_card.html" with event=event %}
      </div>
    {% empty %}
      <div class="col-12">
        <p class="text-muted mb-0">No events to display.</p>
      </div>
    {% endfor %}
  </div>
</div>
