<div class="qi-actions">
  <form method="POST" action="{% url 'rate_event' event.id %}">
    {% csrf_token %}

    <div class="qi-title mb-2">Rate this event</div>

    <div class="mb-3">
      <input
        type="range"
        name="rating"
        min="1"
        max="5"
        step="1"
        value="{{ existing_rating|default:'3' }}"
        class="form-control-range w-100"
      >
    </div>

    <div class="d-flex justify-content-between mb-3">
      <span class="text-muted small">1</span>
      <span class="text-muted small">2</span>
      <span class="text-muted small">3</span>
      <span class="text-muted small">4</span>
      <span class="text-muted small">5</span>
    </div>

    <button type="submit" class="btn btn-primary btn-lg w-100">Submit Rating</button>
    <div class="qi-sub">Choose a value from 1 to 5</div>
  </form>
</div>

<style>
  .form-control-range {
    accent-color: var(--accent);
  }
</style>
