<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
    .search-bar-wrapper {
        max-width: 980px;
        margin: 28px auto 0;
    }

    .search-bar {
        display: grid;
        grid-template-columns: 1fr 1fr 1.4fr auto;
        gap: 10px;
        align-items: center;
        background: var(--card);
        border-radius: 999px;
        padding: 10px;
        box-shadow: var(--shadow);
        border: 1px solid rgba(0,0,0,.06);
    }

    .search-segment {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        min-height: 64px;
        border-radius: 999px;
    }

    .search-icon {
        font-size: 24px;
        color: var(--accent);
        line-height: 1;
        flex-shrink: 0;
    }

    .search-text {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        min-width: 0;
        width: 100%;
    }

    .search-label {
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.1;
        margin-bottom: 2px;
    }

    .search-input {
        border: none;
        background: transparent;
        box-shadow: none;
        padding: 0;
        font-size: 16px;
        color: var(--muted);
        width: 100%;
    }

    .search-input:focus {
        outline: none;
        box-shadow: none;
        background: transparent;
    }

    .search-input::placeholder {
        color: var(--light-muted);
    }

    .search-button,
    .search-button.btn {
    border: 0 !important;
    border-radius: 999px !important;
    background-color: var(--accent) !important;
    color: #fff !important;
    font-weight: 600;
    font-size: 18px;
    min-width: 190px;
    height: 72px;
    padding: 0 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 18px rgba(0,84,147,.18);
    }

    .search-button:hover,
    .search-button.btn:hover {
    background-color: #004574 !important;
    color: #fff !important;
    }


  @media (max-width: 900px) {
    .search-bar {
      grid-template-columns: 1fr;
      border-radius: 24px;
    }

    .search-button {
      width: 100%;
    }
  }

</style>

<div class="search-bar-wrapper">
  <form class="search-bar" method="get" action="{% url 'discover' %}">
    <div class="search-segment">
      <i class="bi bi-calendar3 search-icon"></i>
      <div class="search-text">
        <label for="search-date" class="search-label">Dates</label>
        <input
            type="date"
            id="search-date"
            name="date"
            class="search-input"
            value="{{ request.GET.date|default:'' }}"
            >
      </div>
    </div>

    <div class="search-segment">
      <i class="bi bi-geo-alt search-icon"></i>
      <div class="search-text">
        <label for="search-location" class="search-label">Location</label>
        <input
          type="text"
          id="search-location"
          name="location"
          class="search-input"
          placeholder="All of the UK"
          value="{{ request.GET.location|default:'' }}"
        >
      </div>
    </div>

    <div class="search-segment">
      <i class="bi bi-search search-icon"></i>
      <div class="search-text">
        <label for="search-title" class="search-label">Search</label>
        <input
          type="text"
          id="search-title"
          name="q"
          class="search-input"
          placeholder="Search Events..."
          value="{{ request.GET.q|default:'' }}"
        >
      </div>
    </div>

    <button type="submit" class="btn search-button">Search</button>
  </form>
</div>
