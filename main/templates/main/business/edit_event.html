<!doctype html>
<html lang="en">
<head>

  <!-- Inter Font-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap Icon and CSS-->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit Event | Bookr</title>

  <style>
    :root{
      --max-width: 1100px;
      --text: #111;
      --muted: #444;
      --light-muted: #666;
      --border: #cfcfcf;
      --radius: 16px;
      --shadow: 0 10px 24px rgba(0,0,0,.08);
      --accent: #005493;
      --accent-10: rgba(0, 84, 147, .10);
      --accent-20: rgba(0, 84, 147, .20);
      --bg: #f6f8fb;
      --card: #ffffff;
    }

    * { box-sizing: border-box; }

    body{
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .topbar{
      height: 64px;
      background: var(--accent);
      box-shadow: 0 8px 18px rgba(0,0,0,.10);
      display: flex;
      align-items: center;
      padding: 0 24px;
      justify-content: space-between;
    }

    .topbar-logo{
      color: #fff;
      font-weight: 700;
      font-size: 20px;
      text-decoration: none;
    }

    .topbar-user{
      color: rgba(255,255,255,.85);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .topbar-user:hover{ color: #fff; }

    .page{
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* ── Page header ── */
    .page-header{
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-header h1{
      margin: 0;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .btn-back{
      background: var(--card);
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 8px 20px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      text-decoration: none;
      display: inline-block;
      transition: box-shadow 0.2s;
    }

    .btn-back:hover{
      box-shadow: var(--shadow);
    }

    /* ── Form container ── */
    .form-container{
      background: var(--card);
      border: 1px solid rgba(0,0,0,.06);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
    }

    .form-row{
      margin-bottom: 24px;
    }

    .form-row label{
      display: block;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .form-row input,
    .form-row textarea,
    .form-row select{
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .form-row input:focus,
    .form-row textarea:focus,
    .form-row select:focus{
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-10);
    }

    .form-row textarea{
      resize: vertical;
      min-height: 120px;
    }

    .form-grid{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* ── Photos section ── */
    .photos-section{
      margin-bottom: 24px;
    }

    .photos-section label{
      display: block;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 12px;
      color: var(--text);
    }

    .photo-grid{
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }

    .photo-item{
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg);
    }

    .photo-item img{
      width: 100%;
      height: 100px;
      object-fit: cover;
      display: block;
    }

    .photo-remove{
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(0,0,0,.6);
      color: white;
      border: none;
      border-radius: 999px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }

    .photo-remove:hover{
      background: #dc2626;
    }

    .photo-upload{
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      background: var(--bg);
      cursor: pointer;
    }

    .photo-upload i{
      font-size: 32px;
      color: var(--light-muted);
      margin-bottom: 8px;
    }

    .photo-upload p{
      font-size: 12px;
      color: var(--light-muted);
      margin: 0;
    }

    /* ── Actions ── */
    .form-actions{
      display: flex;
      gap: 16px;
      justify-content: flex-end;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .btn-primary{
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }

    .btn-primary:hover{
      box-shadow: 0 10px 18px rgba(0,84,147,.18);
    }

    .btn-secondary{
      background: var(--bg);
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 12px 28px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn-secondary:hover{
      background: var(--card);
    }

    .btn-danger{
      background: #fff;
      color: #dc2626;
      border: 1px solid #dc2626;
      padding: 12px 28px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-danger:hover{
      background: #dc2626;
      color: white;
    }

    /* ── Responsive ── */
    @media (max-width: 768px){
      .form-grid{
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .photo-grid{
        grid-template-columns: repeat(2, 1fr);
      }
      .form-actions{
        flex-direction: column-reverse;
      }
      .form-actions button,
      .form-actions a{
        text-align: center;
      }
      .page-header h1{
        font-size: 24px;
      }
    }
  </style>

</head>

<body>
  <div class="topbar">
    <a href="/home" class="topbar-logo">Bookr</a>
    <a href="/business-account" class="topbar-user">
      <i class="bi bi-person-circle"></i> {{ business.displayName }}
    </a>
  </div>

  <main class="page">

    <div class="page-header">
      <h1>Edit Event</h1>
      <a href="/business-account/my-events" class="btn-back">
        <i class="bi bi-arrow-left"></i> Back to Events
      </a>
    </div>

    <div class="form-container">
      <form method="post" action="/business-account/my-events/edit-event/{{ event.id }}">
        
        <!-- Basic Info -->
        <div class="form-row">
          <label>Event Title *</label>
          <input type="text" name="title" value="{{ event.title }}" placeholder="Enter event title" required>
        </div>

        <div class="form-grid">
          <div class="form-row">
            <label>Date *</label>
            <input type="date" name="date" value="{{ event.date }}" required>
          </div>
          <div class="form-row">
            <label>Time *</label>
            <input type="time" name="time" value="{{ event.time }}" required>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-row">
            <label>Venue Name *</label>
            <input type="text" name="venue" value="{{ event.venue }}" placeholder="e.g., City Hall" required>
          </div>
          <div class="form-row">
            <label>Address *</label>
            <input type="text" name="address" value="{{ event.venueAddress }}" placeholder="Full address" required>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-row">
            <label>Max Capacity *</label>
            <input type="number" name="maxCapacity" value="{{ event.maxCapacity }}" min="1" required>
          </div>
          <div class="form-row">
            <label>Current Capacity</label>
            <input type="number" name="currentCapacity" value="{{ event.currentCapacity }}" min="0" readonly style="background: var(--bg);">
            <small style="color: var(--light-muted); font-size: 11px;">Current bookings (auto-updated)</small>
          </div>
        </div>

        <!-- Description -->
        <div class="form-row">
          <label>Description *</label>
          <textarea name="description" placeholder="Describe your event...">{{ event.description }}</textarea>
        </div>

        <!-- Photos -->
        <div class="photos-section">
          <label>Event Photos</label>
          <div class="photo-grid">
            {% for photo in eventPhotos %}
            <div class="photo-item">
              <img src="{{ photo.image.url }}" alt="{{ photo.caption }}">
              <button type="button" class="photo-remove" onclick="removePhoto({{ photo.id }})">
                <i class="bi bi-x"></i>
              </button>
            </div>
            {% endfor %}
            <div class="photo-upload" onclick="document.getElementById('photoUpload').click()">
              <i class="bi bi-plus-circle"></i>
              <p>Add photo</p>
              <input type="file" id="photoUpload" name="new_photos" multiple accept="image/*" style="display: none;">
            </div>
          </div>
          <small style="color: var(--light-muted); font-size: 12px;">Upload JPG, PNG or GIF. Max 5MB each.</small>
        </div>

        <!-- Status -->
        <div class="form-row">
          <label>Event Status</label>
          <select name="status">
            <option value="published" {% if event.status == 'published' %}selected{% endif %}>Published</option>
            <option value="draft" {% if event.status == 'draft' %}selected{% endif %}>Draft</option>
            <option value="cancelled" {% if event.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
          </select>
        </div>

        <!-- Actions -->
        <div class="form-actions">
          <button type="button" class="btn-danger" onclick="confirmDelete()">
            <i class="bi bi-trash"></i> Delete Event
          </button>
          <a href="/business-account/my-events" class="btn-secondary">Cancel</a>
          <button type="submit" class="btn-primary">Save Changes</button>
        </div>

      </form>
    </div>

  </main>

  <!-- Bootstrap-->
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

  <script>
    function removePhoto(photoId) {
      if(confirm('Remove this photo?')) {
        // Handle photo removal
        window.location.href = '/business-account/my-events/edit-event/{{ event.id }}/remove-photo/' + photoId;
      }
    }

    function confirmDelete() {
      if(confirm('Are you sure you want to delete this event? This action cannot be undone.')) {
        window.location.href = '/business-account/my-events/delete-event/{{ event.id }}';
      }
    }
  </script>

</body>
</html>
