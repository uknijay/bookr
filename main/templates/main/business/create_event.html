{% extends "main/base.html" %}

{% block title %}Create Event{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<style>
  :root {
    --accent: #005493;
    --accent-dark: #004574;
    --bg: #f6f8fb;
    --text: #111;
    --muted: #666;
  }

  body {
    font-family: "Inter", sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .bookr-card {
    border: none;
    border-radius: 18px;
  }

  .bookr-title {
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .bookr-subtitle {
    color: var(--muted);
  }

  .form-control,
  .form-select {
    border-radius: 12px;
    border-color: #d7dde5;
    padding: 12px 14px;
  }

  .form-control:focus,
  .form-select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 0.2rem rgba(0, 84, 147, 0.12);
  }

  .btn-bookr {
    background-color: var(--accent);
    border-color: var(--accent);
    border-radius: 999px;
    font-weight: 600;
    padding: 10px 18px;
  }

  .btn-bookr:hover {
    background-color: var(--accent-dark);
    border-color: var(--accent-dark);
  }

  .btn-bookr-light {
    border-radius: 999px;
    font-weight: 600;
    padding: 10px 18px;
  }
</style>
{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="mx-auto" style="max-width: 800px;">
    <div class="mb-4">
      <h1 class="display-6 fw-bold bookr-title">Create Event</h1>
      <p class="bookr-subtitle mb-0">Fill in the details below to publish your event.</p>
    </div>

    <div class="card shadow-sm bookr-card">
      <div class="card-body p-4">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label fw-semibold">Event Title</label>
            <input type="text" class="form-control" placeholder="e.g. Hans Zimmer LIVE">
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Description</label>
            <textarea class="form-control" rows="5" placeholder="Describe your event..."></textarea>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Venue</label>
              <input type="text" class="form-control" placeholder="e.g. Madison Square Garden">
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Maximum Capacity</label>
              <input type="number" class="form-control" placeholder="e.g. 500">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Venue Address</label>
            <input type="text" class="form-control" placeholder="Enter full address">
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Date</label>
              <input type="date" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Time</label>
              <input type="time" class="form-control">
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Event Photos</label>
            <input type="file" class="form-control" name="photos" multiple accept="image/*">
            <div class="form-text">You can upload multiple images.</div>
          </div>

          <div class="d-flex gap-2 flex-wrap">
            <button type="submit" class="btn btn-primary btn-bookr">Create Event</button>
            <button type="button" class="btn btn-outline-secondary btn-bookr-light">Save Draft</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
