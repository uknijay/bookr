<!doctype html>
<html lang="en">
<head>

  <!-- Inter Font-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap Icon and CSS-->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Event | Bookr</title>

  <style>
    :root{
      --max-width: 1100px;
      --text: #111;
      --muted: #444;
      --light-muted: #666;
      --border: #cfcfcf;
      --radius: 16px;
      --shadow: 0 10px 24px rgba(0,0,0,.08);
      --accent: #005493;
      --accent-10: rgba(0, 84, 147, .10);
      --accent-20: rgba(0, 84, 147, .20);
      --bg: #f6f8fb;
      --card: #ffffff;
    }

    * { box-sizing: border-box; }

    body{
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .topbar{
      height: 64px;
      background: var(--accent);
      box-shadow: 0 8px 18px rgba(0,0,0,.10);
      display: flex;
      align-items: center;
      padding: 0 24px;
      justify-content: space-between;
    }

    .topbar-logo{
      color: #fff;
      font-weight: 700;
      font-size: 20px;
      text-decoration: none;
    }

    .topbar-user{
      color: rgba(255,255,255,.85);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .topbar-user:hover{ color: #fff; }

    .page{
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* ── Page header ── */
    .page-header{
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-header h1{
      margin: 0;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .btn-back{
      background: var(--card);
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 8px 20px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      text-decoration: none;
      display: inline-block;
      transition: box-shadow 0.2s;
    }

    .btn-back:hover{
      box-shadow: var(--shadow);
    }

    /* ── Form container ── */
    .form-container{
      background: var(--card);
      border: 1px solid rgba(0,0,0,.06);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
    }

    .form-row{
      margin-bottom: 24px;
    }

    .form-row label{
      display: block;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .form-row input,
    .form-row textarea,
    .form-row select{
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .form-row input:focus,
    .form-row textarea:focus,
    .form-row select:focus{
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-10);
    }

    .form-row textarea{
      resize: vertical;
      min-height: 120px;
    }

    .form-grid{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* ── Photos section ── */
    .photos-section{
      margin-bottom: 24px;
    }

    .photos-section label{
      display: block;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 12px;
      color: var(--text);
    }

    .photo-upload-area{
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      background: var(--bg);
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .photo-upload-area:hover{
      border-color: var(--accent);
    }

    .photo-upload-area i{
      font-size: 48px;
      color: var(--light-muted);
      margin-bottom: 12px;
    }

    .photo-upload-area p{
      font-size: 14px;
      color: var(--muted);
      margin: 0;
    }

    .photo-upload-area small{
      font-size: 12px;
      color: var(--light-muted);
      display: block;
      margin-top: 8px;
    }

    .photo-preview-grid{
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-top: 16px;
    }

    .photo-preview-item{
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg);
    }

    .photo-preview-item img{
      width: 100%;
      height: 100px;
      object-fit: cover;
      display: block;
    }

    .photo-preview-remove{
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(0,0,0,.6);
      color: white;
      border: none;
      border-radius: 999px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }

    .photo-preview-remove:hover{
      background: #dc2626;
    }

    /* ── Actions ── */
    .form-actions{
      display: flex;
      gap: 16px;
      justify-content: flex-end;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .btn-primary{
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }

    .btn-primary:hover{
      box-shadow: 0 10px 18px rgba(0,84,147,.18);
    }

    .btn-secondary{
      background: var(--bg);
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 12px 28px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn-secondary:hover{
      background: var(--card);
    }

    /* ── Responsive ── */
    @media (max-width: 768px){
      .form-grid{
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .photo-preview-grid{
        grid-template-columns: repeat(2, 1fr);
      }
      .form-actions{
        flex-direction: column-reverse;
      }
      .form-actions button,
      .form-actions a{
        text-align: center;
      }
      .page-header h1{
        font-size: 24px;
      }
    }
  </style>

</head>

<body>
  <div class="topbar">
    <a href="/home" class="topbar-logo">Bookr</a>
    <a href="/business-account" class="topbar-user">
      <i class="bi bi-person-circle"></i> {{ business.displayName }}
    </a>
  </div>

  <main class="page">

    <div class="page-header">
      <h1>Create Event</h1>
      <a href="/business-account/my-events" class="btn-back">
        <i class="bi bi-arrow-left"></i> Back to Events
      </a>
    </div>

    <div class="form-container">
      <form method="post" action="/business-account/my-events/create-event" enctype="multipart/form-data">
        
        <!-- Basic Info -->
        <div class="form-row">
          <label>Event Title *</label>
          <input type="text" name="title" placeholder="Enter event title" required>
        </div>

        <div class="form-grid">
          <div class="form-row">
            <label>Date *</label>
            <input type="date" name="date" required>
          </div>
          <div class="form-row">
            <label>Time *</label>
            <input type="time" name="time" required>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-row">
            <label>Venue Name *</label>
            <input type="text" name="venue" placeholder="e.g., City Hall, Convention Center" required>
          </div>
          <div class="form-row">
            <label>Address *</label>
            <input type="text" name="address" placeholder="Full street address, city, postcode" required>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-row">
            <label>Max Capacity *</label>
            <input type="number" name="maxCapacity" placeholder="Number of attendees" min="1" required>
          </div>
          <div class="form-row">
            <label>Event Status</label>
            <select name="status">
              <option value="published">Published (visible to customers)</option>
              <option value="draft">Draft (save as draft)</option>
            </select>
          </div>
        </div>

        <!-- Description -->
        <div class="form-row">
          <label>Description *</label>
          <textarea name="description" placeholder="Describe your event... What attendees can expect, schedule, special instructions, etc." required></textarea>
        </div>

        <!-- Photos -->
        <div class="photos-section">
          <label>Event Photos</label>
          <div id="photoUploadArea" class="photo-upload-area" onclick="document.getElementById('photoInput').click()">
            <i class="bi bi-cloud-upload"></i>
            <p>Click to upload photos</p>
            <small>JPG, PNG or GIF. Max 5MB each. Recommended: at least 1200x800px</small>
            <input type="file" id="photoInput" name="photos" multiple accept="image/*" style="display: none;" onchange="previewPhotos(this)">
          </div>
          <div id="photoPreviewGrid" class="photo-preview-grid"></div>
          <small style="color: var(--light-muted); font-size: 12px; display: block; margin-top: 12px;">Add up to 10 photos to showcase your event</small>
        </div>

        <!-- Actions -->
        <div class="form-actions">
          <a href="/business-account/my-events" class="btn-secondary">Cancel</a>
          <button type="submit" class="btn-primary">Create Event</button>
        </div>

      </form>
    </div>

  </main>

  <!-- Bootstrap-->
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

  <script>
    let selectedFiles = [];

    function previewPhotos(input) {
      const previewGrid = document.getElementById('photoPreviewGrid');
      
      for (let i = 0; i < input.files.length; i++) {
        selectedFiles.push(input.files[i]);
      }
      
      displayPreviews();
    }

    function displayPreviews() {
      const previewGrid = document.getElementById('photoPreviewGrid');
      previewGrid.innerHTML = '';
      
      selectedFiles.forEach((file, index) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const previewItem = document.createElement('div');
          previewItem.className = 'photo-preview-item';
          previewItem.innerHTML = `
            <img src="${e.target.result}" alt="Preview">
            <button type="button" class="photo-preview-remove" onclick="removePhoto(${index})">
              <i class="bi bi-x"></i>
            </button>
          `;
          previewGrid.appendChild(previewItem);
        };
        reader.readAsDataURL(file);
      });
      
      // Update file input with all selected files
      const dataTransfer = new DataTransfer();
      selectedFiles.forEach(file => {
        dataTransfer.items.add(file);
      });
      document.getElementById('photoInput').files = dataTransfer.files;
    }

    function removePhoto(index) {
      selectedFiles.splice(index, 1);
      displayPreviews();
    }
  </script>

</body>
</html>
