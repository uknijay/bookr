<!doctype html>
<html lang="en">
<head>

  <!-- Inter Font-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap Icon and CSS-->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rate Business | Bookr</title>

  <style>
    :root{
      --max-width: 800px;
      --text: #111;
      --muted: #444;
      --light-muted: #666;
      --border: #cfcfcf;
      --radius: 16px;
      --shadow: 0 10px 24px rgba(0,0,0,.08);
      --accent: #005493;
      --accent-10: rgba(0, 84, 147, .10);
      --accent-20: rgba(0, 84, 147, .20);
      --bg: #f6f8fb;
      --card: #ffffff;
    }

    * { box-sizing: border-box; }

    body{
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .topbar{
      height: 64px;
      background: var(--accent);
      box-shadow: 0 8px 18px rgba(0,0,0,.10);
      display: flex;
      align-items: center;
      padding: 0 24px;
      justify-content: space-between;
    }

    .topbar-logo{
      color: #fff;
      font-weight: 700;
      font-size: 20px;
      text-decoration: none;
    }

    .topbar-user{
      color: rgba(255,255,255,.85);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .topbar-user:hover{ color: #fff; }

    .page{
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* ── Page header ── */
    .page-header{
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-header h1{
      margin: 0;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .btn-back{
      background: var(--card);
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 8px 20px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      text-decoration: none;
      display: inline-block;
      transition: box-shadow 0.2s;
    }

    .btn-back:hover{
      box-shadow: var(--shadow);
    }

    /* ── Rating Card ── */
    .rating-card{
      background: var(--card);
      border: 1px solid rgba(0,0,0,.06);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 24px;
    }

    .event-info{
      padding: 20px;
      border-bottom: 1px solid rgba(0,0,0,.06);
      display: flex;
      gap: 16px;
    }

    .event-image{
      width: 80px;
      height: 80px;
      border-radius: 12px;
      object-fit: cover;
      background: #e2e8f0;
    }

    .event-details{
      flex: 1;
    }

    .event-title{
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .event-organizer{
      font-size: 13px;
      color: var(--light-muted);
      margin-bottom: 8px;
    }

    .event-date{
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Rating Form ── */
    .rating-form{
      padding: 24px;
    }

    .rating-stars-section{
      text-align: center;
      margin-bottom: 24px;
    }

    .rating-label{
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
      display: block;
    }

    .stars-container{
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .star{
      font-size: 40px;
      cursor: pointer;
      color: #cbd5e0;
      transition: color 0.2s;
    }

    .star:hover,
    .star.active{
      color: #fbbf24;
    }

    .rating-value{
      font-size: 14px;
      color: var(--light-muted);
    }

    .comment-section{
      margin-bottom: 24px;
    }

    .comment-section label{
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    .comment-section textarea{
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      resize: vertical;
      min-height: 100px;
    }

    .comment-section textarea:focus{
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-10);
    }

    .form-actions{
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .btn-submit{
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 28px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-submit:hover{
      box-shadow: 0 10px 18px rgba(0,84,147,.18);
    }

    .btn-skip{
      background: var(--bg);
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 10px 28px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
    }

    .btn-skip:hover{
      background: var(--card);
    }

    /* ── Responsive ── */
    @media (max-width: 600px){
      .event-info{
        flex-direction: column;
        text-align: center;
      }
      .event-image{
        margin: 0 auto;
      }
      .stars-container{
        gap: 8px;
      }
      .star{
        font-size: 32px;
      }
      .form-actions{
        flex-direction: column;
      }
      .page-header h1{
        font-size: 24px;
      }
    }
  </style>

</head>

<body>
  <div class="topbar">
    <a href="/home" class="topbar-logo">Bookr</a>
    <a href="/customer-account" class="topbar-user">
      <i class="bi bi-person-circle"></i> {{ customer.displayName }}
    </a>
  </div>

  <main class="page">

    <div class="page-header">
      <h1>Rate Business</h1>
      <a href="/customer-account/my-bookings/past-events" class="btn-back">
        <i class="bi bi-arrow-left"></i> Back
      </a>
    </div>

    <div class="rating-card">
      <div class="event-info">
        {% if event.image %}
          <img class="event-image" src="{{ event.image }}" alt="{{ event.title }}">
        {% else %}
          <div class="event-image"></div>
        {% endif %}
        <div class="event-details">
          <div class="event-title">{{ event.title }}</div>
          <div class="event-organizer">{{ event.organizer }}</div>
          <div class="event-date">
            <i class="bi bi-calendar3"></i> {{ event.date }}
          </div>
        </div>
      </div>

      <form method="post" action="/customer-account/my-bookings/rate/{{ event.id }}">
        <div class="rating-form">
          <div class="rating-stars-section">
            <div class="rating-label">How would you rate this event?</div>
            <div class="stars-container" id="starsContainer">
              <i class="bi bi-star star" data-rating="1"></i>
              <i class="bi bi-star star" data-rating="2"></i>
              <i class="bi bi-star star" data-rating="3"></i>
              <i class="bi bi-star star" data-rating="4"></i>
              <i class="bi bi-star star" data-rating="5"></i>
            </div>
            <input type="hidden" name="rating" id="ratingValue" value="">
            <div class="rating-value" id="ratingText">Click a star to rate</div>
          </div>

          <div class="comment-section">
            <label>Your Review (Optional)</label>
            <textarea name="comment" placeholder="Share your experience..."></textarea>
          </div>

          <div class="form-actions">
            <a href="/customer-account/my-bookings/past-events" class="btn-skip">Skip</a>
            <button type="submit" class="btn-submit">Submit Rating</button>
          </div>
        </div>
      </form>
    </div>

  </main>

  <!-- Bootstrap-->
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

  <script>
    let selectedRating = 0;
    const stars = document.querySelectorAll('.star');
    const ratingInput = document.getElementById('ratingValue');
    const ratingText = document.getElementById('ratingText');

    stars.forEach(star => {
      star.addEventListener('click', function() {
        selectedRating = parseInt(this.dataset.rating);
        ratingInput.value = selectedRating;
        
        stars.forEach(s => {
          const rating = parseInt(s.dataset.rating);
          if (rating <= selectedRating) {
            s.classList.remove('bi-star');
            s.classList.add('bi-star-fill');
            s.classList.add('active');
          } else {
            s.classList.remove('bi-star-fill');
            s.classList.add('bi-star');
            s.classList.remove('active');
          }
        });
        
        if (selectedRating === 1) ratingText.textContent = 'Poor';
        else if (selectedRating === 2) ratingText.textContent = 'Fair';
        else if (selectedRating === 3) ratingText.textContent = 'Good';
        else if (selectedRating === 4) ratingText.textContent = 'Very Good';
        else if (selectedRating === 5) ratingText.textContent = 'Excellent';
      });
      
      star.addEventListener('mouseenter', function() {
        const hoverRating = parseInt(this.dataset.rating);
        stars.forEach(s => {
          const rating = parseInt(s.dataset.rating);
          if (rating <= hoverRating) {
            s.classList.remove('bi-star');
            s.classList.add('bi-star-fill');
          } else {
            s.classList.remove('bi-star-fill');
            s.classList.add('bi-star');
          }
        });
      });
    });
    
    document.getElementById('starsContainer').addEventListener('mouseleave', function() {
      stars.forEach(s => {
        const rating = parseInt(s.dataset.rating);
        if (rating <= selectedRating) {
          s.classList.remove('bi-star');
          s.classList.add('bi-star-fill');
        } else {
          s.classList.remove('bi-star-fill');
          s.classList.add('bi-star');
        }
      });
    });
  </script>

</body>
</html>
