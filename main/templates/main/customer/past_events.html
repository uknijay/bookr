<!doctype html>
<html lang="en">
<head>

  <!-- Inter Font-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap Icon and CSS-->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Past Events | Bookr</title>

  <style>
    :root{
      --max-width: 1100px;
      --text: #111;
      --muted: #444;
      --light-muted: #666;
      --border: #cfcfcf;
      --radius: 16px;
      --shadow: 0 10px 24px rgba(0,0,0,.08);
      --accent: #005493;
      --accent-10: rgba(0, 84, 147, .10);
      --accent-20: rgba(0, 84, 147, .20);
      --bg: #f6f8fb;
      --card: #ffffff;
    }

    * { box-sizing: border-box; }

    body{
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .topbar{
      height: 64px;
      background: var(--accent);
      box-shadow: 0 8px 18px rgba(0,0,0,.10);
      display: flex;
      align-items: center;
      padding: 0 24px;
      justify-content: space-between;
    }

    .topbar-logo{
      color: #fff;
      font-weight: 700;
      font-size: 20px;
      text-decoration: none;
    }

    .topbar-user{
      color: rgba(255,255,255,.85);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .topbar-user:hover{ color: #fff; }

    .page{
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* ── Page header ── */
    .page-header{
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-header h1{
      margin: 0;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .btn-back{
      background: var(--card);
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 8px 20px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      text-decoration: none;
      display: inline-block;
      transition: box-shadow 0.2s;
    }

    .btn-back:hover{
      box-shadow: var(--shadow);
    }

    /* ── Section headers ── */
    .section-header{
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .section-header h2{
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }

    /* ── Events grid ── */
    .events-grid{
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-bottom: 36px;
    }

    /* ── Event card ── */
    .event-card{
      background: var(--card);
      border: 1px solid rgba(0,0,0,.06);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .event-card-img{
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
      background: #e2e8f0;
    }

    .event-card-body{
      padding: 12px 14px 8px;
    }

    .event-card-title{
      font-size: 15px;
      font-weight: 700;
      margin: 0 0 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-card-meta{
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .past-card-rating{
      padding: 8px 14px 12px;
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      border-top: 1px solid rgba(0,0,0,.06);
    }

    .past-stars{
      color: var(--accent);
      letter-spacing: 1px;
    }

    .past-rating-num{ font-weight: 700; color: var(--text); }

    /* ── Responsive ── */
    @media (max-width: 1080px){
      .events-grid{ grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px){
      .events-grid{ grid-template-columns: 1fr; }
      .page-header h1{ font-size: 24px; }
    }
  </style>

</head>

<body>
  <div class="topbar">
    <a href="/home" class="topbar-logo">Bookr</a>
    <a href="/customer-account" class="topbar-user">
      <i class="bi bi-person-circle"></i> {{ customer.displayName }}
    </a>
  </div>

  <main class="page">

    <div class="page-header">
      <h1>Past Events</h1>
      <a href="/customer-account/my-bookings" class="btn-back">
        <i class="bi bi-arrow-left"></i> Back
      </a>
    </div>

    <!-- Past Events -->
    <div class="section-header">
      <h2>Past Events</h2>
    </div>

    <div class="events-grid">
      {% for event in pastEvents %}
      <div class="event-card">
        {% if event.image %}
          <img class="event-card-img" src="{{ event.image }}" alt="{{ event.title }}" style="filter:grayscale(40%);">
        {% else %}
          <div class="event-card-img"></div>
        {% endif %}

        <div class="event-card-body">
          <div class="event-card-title">{{ event.title }}</div>
          <div class="event-card-meta">
            {{ event.organizer }}<br>
            {{ event.date }}
          </div>
        </div>

        <div class="past-card-rating">
          {% if event.rating %}
            <span class="past-stars">★★★★☆</span>
            <span class="past-rating-num">{{ event.rating }}</span>
          {% else %}
            <span style="color:var(--light-muted);">Not yet rated</span>
          {% endif %}
          <span style="margin-left:auto;">
            <a href="/customer-account/my-bookings/rate/{{ event.id }}" class="btn-card" style="display:inline-block; background:var(--accent-10); color:var(--accent); padding:4px 12px; border-radius:999px; font-size:12px; text-decoration:none;">Rate</a>
          </span>
        </div>
      </div>
      {% endfor %}
    </div>

  </main>

  <!-- Bootstrap-->
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

</body>
</html>
